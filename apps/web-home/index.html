<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPHINCS Beta V1</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b0f14;
        --surface: #121821;
        --line: #1f2a37;
        --text: #e5e7eb;
        --text-2: #9ca3af;
        --gold: #f59e0b;
        --gold-hover: #d97706;
        --soft-gold: rgba(245, 158, 11, 0.1);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
        min-height: 100vh;
        background:
          radial-gradient(circle at 14% 14%, rgba(245, 158, 11, 0.18), transparent 38%),
          radial-gradient(circle at 88% 22%, rgba(245, 158, 11, 0.12), transparent 46%),
          var(--bg);
      }
      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        position: sticky;
        top: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 24px;
        border-bottom: 1px solid var(--line);
        background: rgba(11, 15, 20, 0.8);
        backdrop-filter: blur(8px);
        z-index: 5;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text);
        text-decoration: none;
      }
      .logo {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        object-fit: contain;
        background: var(--soft-gold);
        border: 1px solid rgba(245, 158, 11, 0.3);
        padding: 4px;
      }
      .brand span {
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .nav {
        display: flex;
        gap: 12px;
      }
      .nav a {
        color: var(--text-2);
        text-decoration: none;
        font-size: 14px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
      }
      .nav a:hover {
        background: var(--soft-gold);
        color: var(--text);
        border-color: rgba(245, 158, 11, 0.4);
      }
      .hero-wrap {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 40px 20px 56px;
      }
      .hero {
        width: min(980px, 100%);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 44px 30px 34px;
        background: linear-gradient(170deg, rgba(18, 24, 33, 0.95) 0%, rgba(11, 15, 20, 0.95) 100%);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
        text-align: center;
      }
      .beta-tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--gold);
        border-radius: 999px;
        padding: 6px 12px;
        color: var(--gold);
        font-weight: 700;
        background: var(--soft-gold);
        margin-bottom: 16px;
      }
      h1 {
        margin: 0;
        font-size: clamp(46px, 10vw, 112px);
        line-height: 0.94;
        letter-spacing: 0.06em;
        color: var(--text);
      }
      .subtitle {
        margin: 18px auto 0;
        max-width: 720px;
        color: var(--text-2);
        font-size: clamp(16px, 2.5vw, 22px);
      }
      .cta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin: 26px auto 0;
        max-width: 680px;
      }
      .btn {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 56px;
        text-decoration: none;
        border-radius: 14px;
        font-weight: 800;
        letter-spacing: 0.02em;
        transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
      }
      .btn-erp {
        background: linear-gradient(135deg, var(--gold), var(--gold-hover));
        color: #111827;
        box-shadow: 0 12px 26px rgba(245, 158, 11, 0.32);
      }
      .btn-crm {
        background: transparent;
        color: var(--text);
        border: 1px solid rgba(245, 158, 11, 0.5);
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.32);
      }
      .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.03);
      }
      .foot {
        margin-top: 18px;
        color: var(--text-2);
        font-size: 14px;
      }
      .foot code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
      }
      @media (max-width: 760px) {
        .topbar {
          padding: 12px 14px;
        }
        .nav {
          display: none;
        }
        .hero {
          padding: 30px 18px 24px;
          border-radius: 18px;
        }
        .cta {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="brand" href="./">
          <img
            class="logo"
            src="./assets/branding/apple-touch-icon.png"
            alt="SPHINCS logo"
          />
          <span>SPHINCS</span>
        </a>
        <nav class="nav">
          <a href="./erp/">ERP</a>
          <a href="./crm/">CRM</a>
          <a href="./#beta">Beta V1</a>
        </nav>
      </header>

      <main class="hero-wrap">
        <div class="hero" id="beta">
          <div class="beta-tag">Public Test Build</div>
          <h1>BETA V1</h1>
          <p class="subtitle">
            SPHINCS ERP + CRM testing environment.
            Choose your module and jump straight into the beta.
          </p>
          <div class="cta">
            <a class="btn btn-erp" href="./erp/">Open ERP</a>
            <a class="btn btn-crm" href="./crm/">Open CRM</a>
          </div>
          <p class="foot">
            Requires a reachable backend API at <code>VITE_API_BASE_URL</code>.
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
