<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPHINCS ERP + CRM</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --card: #ffffff;
        --text: #14213d;
        --muted: #4b5563;
        --accent: #0f62fe;
        --border: #dbe2ea;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
        color: var(--text);
      }
      .container {
        max-width: 880px;
        margin: 48px auto;
        padding: 0 20px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
      }
      h1 { margin-top: 0; }
      p { color: var(--muted); line-height: 1.5; }
      .links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 12px;
        margin-top: 20px;
      }
      a {
        display: block;
        text-decoration: none;
        color: var(--accent);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
        background: #f9fbff;
        font-weight: 600;
      }
      a:hover { background: #edf3ff; }
      code {
        background: #eef2f7;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="panel">
        <h1>SPHINCS ERP + CRM</h1>
        <p>
          GitHub Pages deployment entry for the SPHINCS frontend apps.
          Use the links below to open each app.
        </p>
        <div class="links">
          <a href="./erp/">Open ERP App</a>
          <a href="./crm/">Open CRM App</a>
        </div>
        <p style="margin-top: 20px;">
          Note: both apps require a reachable backend API at
          <code>VITE_API_BASE_URL</code>.
        </p>
      </div>
    </div>
  </body>
</html>
