name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ERP (Pages base path)
        run: pnpm --filter @sphincs/erp-web build
        env:
          VITE_PUBLIC_BASE: /sphincs-ERP-CRM/erp/

      - name: Build CRM (Pages base path)
        run: pnpm --filter @sphincs/crm-web build
        env:
          VITE_PUBLIC_BASE: /sphincs-ERP-CRM/crm/

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/erp _site/crm
          cp -r apps/erp-web/dist/* _site/erp/
          cp -r apps/crm-web/dist/* _site/crm/
          cp apps/web-home/index.html _site/index.html
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
